<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>2 Players guess number</title>
        <style>
            body{
                margin-left: 100px;
                margin-top: 100px;
                background-color: #E0F7FA;

            }
            .numpad{
                border: 2px solid black;
                border-radius: 5px;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                height: 350px;
                width: 270px;
        
            }
            .indi{
                height: 50px;
                width: 50px;
                border: 2px solid #055c84; 
                border-radius: 2.5px;
                margin:15px;
                display: flex;
                justify-content: center;
                align-items: center;
                cursor: pointer;
                background-color: #64B5F6;   
            }
            .indi:hover{
                background-color: #26C6DA;
                color: #FFFFFF;
                border: 2px solid green;
            }
            .numpad1{
                border:2px solid rgb(255, 154, 30);
                border-radius: 5px;
                display: flex;
                flex-wrap: wrap;
                height: 355px;
                width: 270px;
                /* background-color: #212121; */
            }
            .indi1{
                height: 50px;
                width: 50px;
                margin: 15px;
                border-radius: 2.5px;
                border: 2px solid #F57C00;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                background-color: #FFD54F;
                color: #212121;
            }
            .indi1:hover{
                background-color:  #FB8C00;
                border: 2px solid white;

            }
            h1{
                background-color: antiquewhite;
                border: 2.5px solid black;
                border-radius: 2.5px;
            
            }
            #tables{
                display: flex;
                gap: 30px;
                align-items: flex-start;
                justify-content: center;
            }
            .player{
                display: flex;
                flex-direction: column;
                /*align-items: center; */
            }
            #searchinput{
                background-color: #F1F8E9;
                border: 2.5px solid #26C6DA;
                border-radius: 5px;
                color:#004D40;

            }
            #searchinput1{
                border: 2.5px solid #FF7043;
                background-color: #FFFDE7;
                border-radius: 5.5px;
                color: 	#BF360C;
            }
            .overlay{
                display: none;
                position: fixed;
                top: 0;left: 0;
                width: 100%;height: 100%;
                background: rgba(0, 0, 0,0.5);
                z-index: 5;
            }
            .popcontents{
                background: white;
                padding: 20px;
                width: 300px;
                margin: 15% auto;
                border-radius: 8px;
                background-color: #26C6DA;
            }
            #popbutton{
                background-color:#64B5F6;
                height: 30px;
                width: 50px;
                color: white;
                border:1px solid white;
                border-radius: 1px;

            }
        </style>
    </head>
    <body>
        <h2>Guess the number</h2>
        <h4>Fastest one to guess the number wins</h4>
        <div id="tables">
        <div class="player">
            <p>Play</p>
        <form id="searchform">
            <input type="number" id="searchinput" placeholder="Enter the number" class="search">
            <button type="submit" id="submitbtn">Guess</button>
        </form>
    <p id="displayarea">Guess the number</p>
    <div class="numpad">
        <div id="1" class="indi">1</div>
        <div id="2" class="indi">2</div>
        <div id="3" class="indi">3</div>
        <div id="4" class="indi">4</div>
        <div id="5" class="indi">5</div>
        <div id="6" class="indi">6</div>
        <div id="7" class="indi">7</div>
        <div id="8" class="indi">8</div>
        <div id="9" class="indi">9</div>
        <div class="indi"></div>
        <div class="indi" id="0">0</div>
    </div>
    <p id="Attempts">Attempts:0</p>
    </div>
    <div class="player">
    <form id="searchform1">
        <input type="number" id="searchinput1" placeholder="Enter the number" class="search">
        <button type="submit" id="submitbtn1">Guess</button>
    </form>
    <p id="displayarea1">Guess the Number</p>
    <div class="numpad1">
        <div class="indi1" id="1">1</div>
        <div class="indi1" id="2">2</div>
        <div class="indi1" id="3">3</div>
        <div class="indi1" id="4">4</div>
        <div class="indi1" id="5">5</div>
        <div class="indi1" id="6">6</div>
        <div class="indi1" id="7">7</div>
        <div class="indi1" id="8">8</div>
        <div class="indi1" id="9">9</div>
        <div class="indi1" style="border: none;"></div>
        <div class="indi1" id="0">0</div>
    </div>
    <p id="Attempts1">Attempts:0</p>
    </div>
    </div>
    <div id="popup" class="overlay">
        <div class="popcontents">
            <p>Congratulations!</p>
            <p id="Atttempts"></p>
            <button onclick="window.location.reload()" id="popbutton">Retry</button>
        </div>
    </div>
    <script>
        let searchform=document.getElementById("searchform");
        let searchinput=document.getElementById("searchinput");
        let displayarea=document.getElementById("displayarea");
        let searchform1=document.getElementById("searchform1")
        let searchinput1=document.getElementById("searchinput1");
        let displayarea1=document.getElementById("displayarea1");
        let attempts=0,attempts1=0,i=0,j=0;
        let Attempts=document.getElementById("Attempts");
        let Attempts1=document.getElementById("Attempts1");
        let random=Math.floor(Math.random()*100)+1;
        let random1=Math.floor(Math.random()*100)+1;
        searchform.addEventListener("click",function(event){
            event.preventDefault();
            let userinput=Number(searchinput.value);
            if(userinput>random){
                displayarea.innerText='The number is less';
            }else if(userinput<random){
                displayarea.innerText='The number is more';
            }else{
                displayarea.innerText='Correct answer';
                i=1;
                winner();
            }
            searchinput.value='';
            attempts++;
            Attempts.innerText='Attempts:'+attempts;
        })
        function winner(){
            let att=document.getElementById("Atttempts");
            let popup=document.getElementById('popup');
            if(i===1&&j===1){
                popup.style.display='block';
                
                if(attempts>attempts1){
                    att.innerText='Player 1 has won\nPlayer 2 do you want a re-match?';
                }else if(attempts1>attempts){
                    att.innerText='Player 2 has won\nPlayer 1 do you want a re-match?'
                }
            }
        }
        console.log(random,random1);
        let a1=document.querySelectorAll(".indi");
        a1.forEach((numpad)=>{
            numpad.addEventListener("click",function(){
                searchinput.value+=numpad.getAttribute("id");
            })
        })
        searchform1.addEventListener("click",function(event){
            event.preventDefault();
            let userinput1=Number(searchinput1.value);
            if(userinput1>random1){
                displayarea1.innerText='The number is less';
            }else if(userinput1<random1){
                displayarea1.innerText='The number is more';
            }else{
                displayarea1.innerText='Correct answer';
                j=1;
                winner();
            }
            searchinput1.value='';
            attempts1++;
            Attempts1.innerText='Attempts:'+attempts1;
        })
        let a2=document.querySelectorAll(".indi1");
        a2.forEach((numpad1)=>{
            numpad1.addEventListener("click",function(){
                searchinput1.value+=numpad1.getAttribute("id");
            })
        })
        </script>
    </body>
</html>
