<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Guess the Number</title>
        <style>
            body{
                padding-top: 45px;
                padding-left: 120px;
                padding-right: 45px;
                flex-wrap: wrap;
                background-color: #E0F7FA;
                color: #004D40;
            }
            .numpad{
                height: 300px;
                width: 223px;
                display: flex;
                flex-wrap: wrap;
                border: 2px solid black;
                border-radius: 10px;
            }
            .indi{
                height: 50px;
                width: 50px;
                background-color:#64B5F6;
                margin:10px;
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
                border: 2px solid #055c84; 
                border-radius: 5px;
            }
            h3{
                background-color: #ae2f43;
            }
            .indi:hover{
                background-color: #26C6DA;
                color: #FFFFFF;
                border: 2px solid green;
            }
            .search{
                border: 2px solid#26C6DA;
                border-radius: 8px;
                background-color: #F1F8E9;
                color: #004D40;
                width:200px;
                height: 25px;
                font-size: 15px;
            }
            #submit-btn{
                background-color: #64B5F6;
                border:2px solid #26C6DA;
                color: #004D40;
                height: 25px;
                margin-left: 7px;
                border-radius: 5px;
            }
            #submit-btn:hover{
                background-color: #26C6DA;
                color: #FFFFFF;
            }
            .overlay{
                display: none;
                position: fixed;
                top: 0;left: 0;
                width: 100%;height: 100%;
                background: rgba(0, 0,0,0.5);
                z-index: 5;
            }
            .popcontent{
                background: white;
                padding: 20px;
                width: 300px;
                margin: 15% auto;
                border-radius: 8px;
                background-color: #26C6DA;
            }
            #popbutton{
                background-color:#64B5F6;
                height: 30px;
                width: 50px;
                color: white;
                border:1px solid white;
                border-radius: 1px;

            }
        </style>
    </head>
    <body>
        <h2 style="align-items: center;">Guess the number</h2>
        <form id="search-form">
        <input type="number" id="search-input" class="search" placeholder=" Enter the number">
        <button type="submit" id="submit-btn">Guess</button>
        </form>
        <p id="display-area">Guess the Number</p>
        <div class="numpad">
            <div id="1" class="indi">1</div>
            <div id="2" class="indi">2</div>
            <div id="3" class="indi">3</div>
            <div id="4" class="indi">4</div>
            <div id="5" class="indi">5</div>
            <div id="6" class="indi">6</div>
            <div id="7" class="indi">7</div>
            <div id="8" class="indi">8</div>
            <div id="9" class="indi">9</div>
            <div class="indi" style="background-color: #E3F2FD;border: none;"></div>
            <div id="0" class="indi">0</div>
        </div>
        <p id="Attempts">Attempts:</p>
        <div id="popup" class="overlay">
            <div class="popcontent">
            <h2>Congratulations!</h2>
            <p id="att"></p>
            <button onclick="window.location.reload()" id="popbutton">Retry</button>
            </div>
        </div>
        <script>
            let searchform=document.getElementById("search-form");
            let searchInput=document.getElementById("search-input");
            let displayArea=document.getElementById("display-area");
            let Attempts=0;
            let attempts=document.getElementById("Attempts");
            let random=Math.floor(Math.random()*100)+1;
            // console.log(random);
            searchform.addEventListener('submit',function(event){
                event.preventDefault();
                let userInput=Number(searchInput.value);
                if(userInput>random){
                    displayArea.innerText='The number is less';
                }else if(userInput<random){
                    displayArea.innerText='The number is more';
                }else{
                    displayArea.innerText='Correct answer';
                    let popup=document.getElementById('popup');
                    let att=document.getElementById("att");
                    att.innerText='Attempts:'+Attempts;
                    popup.style.display='block';
                }
                searchInput.value='';
                Attempts++;
                attempts.innerText='Attempts:'+Attempts;
            })
            let a1=document.querySelectorAll(".indi");
            a1.forEach((numpad)=>{
                numpad.addEventListener("click",function(){
                    searchInput.value+=numpad.getAttribute("id");
                })
            })
        </script>
    </body>
</html>
