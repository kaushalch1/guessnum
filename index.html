<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Guess the Number</title>
        <style>


            body{
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: var(--bg);
                color: var(--text);
                font-family: Georgia, "Times New Roman", serif;
                padding: 24px;
            }

            .panel{
                width: min(680px, 100%);
                background: var(--card);
                border: 1px solid var(--line);
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.08);
                padding: 28px;
            }
                        :root{
                --bg: #f7f4ee;
                --card: #ffffff;
                --text: #1f1f1f;
                --muted: #5a5a5a;
                --line: #ddd6ca;
                --primary: #2a6f97;
                --primary-hover: #1f5a7b;
            }

            *{
                box-sizing: border-box;
            }   
            h1{
                margin: 0 0 10px;
                font-size: clamp(30px, 5vw, 44px);
                line-height: 1.1;
                font-weight: 700;
            }

            p{
                margin: 0;
                color: var(--muted);
                font-size: 18px;
            }

            .modes{
                margin-top: 24px;
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 12px;
            }

            .mode-link{
                display: inline-flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                text-decoration: none;
                color: white;
                background: var(--primary);
                border-radius: 8px;
                min-height: 48px;
                padding: 10px 12px;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                font-weight: 600;
                transition: background-color 160ms ease;
            }

            .mode-link:hover{
                background: var(--primary-hover);
            }

                .note{
                    margin-top: 16px;
                    font-size: 14px;
                    color: #6b665d;
                }

        </style>
    </head>
    <body>
        <main class="panel">
            <h1>Guess the Number</h1>
            <p>Pick a mode and try to find the hidden number between 1 and 100.</p>

            <section class="modes" aria-label="Game modes">
                <a class="mode-link" href="1p.html">1 Player</a>
                <a class="mode-link" href="1vbot.html">1 vs Bot</a>
                <a class="mode-link" href="2p.html">2 Players</a>
            </section>

            <p class="note">Tip: Lower attempts means a better score.</p>
        </main>
    </body>
</html>
